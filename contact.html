<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اتصل بنا</title>
    <style>
        body {font-family: Arial; background-color: #fff3e0;}
        h1 {color: #e65100; text-align: center;}
        form {
            width: 50%;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #e65100;
        }
        input, textarea {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background-color: #e65100;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }
        .menu {background-color: #0277bd; padding: 15px; text-align: center;}
        .menu a {color: white; text-decoration: none; padding: 10px 20px; font-weight: bold;}
    </style>
    <script>
        function validateForm() {
            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            if(name == "" || email == "") {
                alert("الرجاء ملء جميع الحقول!!");
                return false;
            } else {
                alert("تم إرسال رسالتك بنجاح. شكراً لك " + name);
                return true;
            }
        }
    </script>
</head>
<body>
<div class="menu">
    <a href="index.html">الرئيسية</a>
    <a href="books.html">الكتب</a>
    <a href="contact.html">اتصل بنا</a>
    <a href="about.html">عن المكتبة</a>
</div>

<h1>نموذج التواصل معنا</h1>

<form onsubmit="return validateForm()">
    <label>الاسم:</label><br>
    <input type="text" id="name"><br>
    
    <label>البريد الإلكتروني:</label><br>
    <input type="email" id="email"><br>
    
    <label>الرسالة:</label><br>
    <textarea rows="5"></textarea><br>
    
    <button type="submit">إرسال</button>
</form>
</body>
</html>
